<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VisualStimEdger OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Rajdhani', 'Segoe UI', Arial, sans-serif;
    color: #eee;
    overflow: hidden;
  }
  .overlay {
    position: fixed;
    bottom: 12px;
    left: 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    width: 200px;
  }

  /* ── EDGING banner — stacks above vol bar ── */
  .edging-banner {
    display: none;
    width: 100%;
    align-items: center;
    justify-content: center;
    padding: 7px 0;
    background: rgba(0,0,0,0.5);
    border-radius: 6px;
    border: 1px solid rgba(255,23,68,0.3);
    font-family: 'Rajdhani', 'Impact', 'Arial Black', sans-serif;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 0.12em;
    white-space: nowrap;
    color: #ff1744;
    text-shadow:
      0 0 8px   #ff1744,
      0 0 20px  #ff1744,
      0 0 40px  #ff174499;
    -webkit-text-stroke: 1px #ffffff33;
    pointer-events: none;
  }
  .edging-banner.on {
    display: flex;
    animation: edge-flash 0.28s steps(2) infinite;
  }
  @keyframes edge-flash {
    0%   {
      color: #ff1744;
      text-shadow:
        0 0 20px  #ff1744,
        0 0 45px  #ff1744,
        0 0 90px  #ff174499,
        0 0 160px #ff174466;
      transform: scale(1);
    }
    50%  {
      color: #ffffff;
      text-shadow:
        0 0 30px  #ff1744,
        0 0 70px  #ff1744,
        0 0 140px #ff1744cc;
      transform: scale(1.04);
    }
  }

  /* ── TATTLE banner — letmecum result ──── */
  .tattle-banner {
    display: none;
    width: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5px 0 4px;
    background: rgba(0,0,0,0.6);
    border-radius: 6px;
    font-family: 'Rajdhani', 'Impact', 'Arial Black', sans-serif;
    font-weight: 900;
    letter-spacing: 0.08em;
    white-space: nowrap;
    pointer-events: none;
  }
  .tattle-lbl {
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.65;
    font-weight: 700;
  }
  .tattle-result {
    font-size: 22px;
    line-height: 1.15;
  }
  .tattle-banner.denied {
    display: flex;
    color: #ff1744;
    border: 1px solid rgba(255,23,68,0.4);
    animation: tattle-deny 0.45s steps(2) infinite;
  }
  .tattle-banner.granted {
    display: flex;
    color: #00e676;
    border: 1px solid rgba(0,230,118,0.35);
    animation: tattle-grant 1.2s ease-in-out infinite alternate;
  }
  .tattle-banner.expired {
    display: flex;
    color: #ff9800;
    border: 1px solid rgba(255,152,0,0.35);
  }
  @keyframes tattle-deny {
    0%   { text-shadow: 0 0 12px #ff1744, 0 0 30px #ff174488; opacity: 1; }
    50%  { text-shadow: 0 0 4px #ff174466; opacity: 0.55; }
  }
  @keyframes tattle-grant {
    0%   { text-shadow: 0 0 6px #00e67666; }
    100% { text-shadow: 0 0 16px #00e676, 0 0 35px #00e67888; }
  }

  /* ── Event line ───────────────────────── */
  .evt {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .evt.on { opacity: 1; }
  .evt.g { color: #00e676; text-shadow: 0 0 6px #00e67666; }
  .evt.r { color: #ff1744; text-shadow: 0 0 6px #ff174466; font-size: 14px; }
  .evt.p { color: #e040fb; text-shadow: 0 0 6px #e040fb66; }

  /* ── Volume bars ──────────────────────── */
  .vol-card {
    background: rgba(0,0,0,0.5);
    border-radius: 6px;
    padding: 6px 8px;
    display: flex;
    align-items: flex-end;
    gap: 3px;
    border: 1px solid rgba(224,64,251,0.15);
  }
  .bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    flex: 1;
  }
  .bar {
    flex: 1;
    border-radius: 1px;
    background: rgba(255,255,255,0.08);
    transition: background 0.15s;
  }
  .bar.lit {
    background: #4caf50;
    box-shadow: 0 0 3px currentColor;
  }
  .bar.lit.hot {
    animation: flicker 0.15s infinite alternate;
  }
  @keyframes flicker {
    0%   { opacity: 1; }
    100% { opacity: 0.7; }
  }
  .vol-pct {
    font-size: 13px;
    font-weight: 800;
    min-width: 32px;
    text-align: right;
    color: #ccc;
    line-height: 1;
    padding-bottom: 1px;
  }

  /* ── Stat cards ───────────────────────── */
  .stats {
    display: flex;
    gap: 4px;
  }
  .stat {
    flex: 1;
    background: rgba(0,0,0,0.5);
    border-radius: 6px;
    padding: 5px 0;
    text-align: center;
    border: 1px solid rgba(224,64,251,0.15);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  /* ── Zap icon ─────────────────────────── */
  .zap {
    font-size: 20px;
    line-height: 1;
    flex-shrink: 0;
    animation: zap 2s ease-in-out infinite;
    filter: drop-shadow(0 0 4px #e040fb);
  }
  @keyframes zap {
    0%, 90%, 100% { opacity: 0.3; }
    92% { opacity: 1; transform: scale(1.3); }
    94% { opacity: 0.4; }
    96% { opacity: 1; transform: scale(1.1); }
  }
  .stat-val {
    font-size: 16px;
    font-weight: 800;
    color: #e040fb;
    line-height: 1.1;
  }
  .stat-lbl {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #00e5ff;
    text-shadow: 0 0 4px #00e5ff88, 0 0 8px #00e5ff44;
    animation: neon-slow 2s ease-in-out infinite alternate;
  }
  .stat-lbl.erect {
    animation: neon-med 0.8s ease-in-out infinite alternate;
  }
  .stat-lbl.edging {
    animation: neon-fast 0.2s steps(2) infinite;
    color: #ff1744;
    text-shadow: 0 0 6px #ff1744cc, 0 0 14px #ff174466;
  }
  @keyframes neon-slow {
    0%   { text-shadow: 0 0 2px #00e5ff44; opacity: 0.5; }
    100% { text-shadow: 0 0 6px #00e5ffaa, 0 0 12px #00e5ff44; opacity: 0.9; }
  }
  @keyframes neon-med {
    0%   { text-shadow: 0 0 4px #00e5ff88; opacity: 0.7; }
    100% { text-shadow: 0 0 8px #00e5ffcc, 0 0 18px #00e5ff55; opacity: 1; }
  }
  @keyframes neon-fast {
    0%   { text-shadow: 0 0 6px #ff1744cc, 0 0 14px #ff174466; opacity: 1; }
    50%  { text-shadow: 0 0 2px #ff174488; opacity: 0.5; }
    100% { text-shadow: 0 0 10px #ff1744ff, 0 0 22px #ff174488; opacity: 1; }
  }

  .loads {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .loads.on { opacity: 1; }
  .load-card {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 2px 0;
    text-align: center;
  }
  .load-val {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }
  .load-lbl {
    font-size: 7px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #aaa;
  }
  .dc {
    text-align: center;
    font-size: 8px;
    color: #444;
  }

  /* ── HR (heart rate) pill ─────────────────── */
  .hr-pill {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: rgba(0,0,0,0.5);
    border-radius: 6px;
    border: 1px solid rgba(233,30,99,0.35);
    padding: 3px 8px;
    font-size: 12px;
    font-weight: 800;
    color: #e91e63;
    letter-spacing: 0.05em;
    pointer-events: none;
  }
  .hr-pill.on { display: flex; }
  .hr-heart {
    font-size: 14px;
    animation: heartbeat 1s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%   { transform: scale(1);    opacity: 1;   }
    14%  { transform: scale(1.3);  opacity: 1;   }
    28%  { transform: scale(1);    opacity: 0.8; }
    42%  { transform: scale(1.15); opacity: 1;   }
    70%  { transform: scale(1);    opacity: 0.9; }
    100% { transform: scale(1);    opacity: 1;   }
  }
</style>
</head>
<body>
<div class="overlay">
  <div class="edging-banner" id="edging">EDGING!!</div>
  <div class="tattle-banner" id="tattle">
    <div class="tattle-lbl" id="tattleLbl">they asked to cum</div>
    <div class="tattle-result" id="tattleResult">DENIED!</div>
  </div>
  <div class="hr-pill" id="hrPill">
    <span class="hr-heart" id="hrHeart">♥</span>
    <span id="hrBpm">-- bpm</span>
  </div>
  <div class="evt" id="evt"></div>

  <div class="vol-card">
    <span class="zap">&#9889;</span>
    <div class="bars" id="bars"></div>
    <div class="vol-pct" id="volPct">0%</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="edges">0</div>
      <div class="stat-lbl">Edges</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="time">0:00</div>
      <div class="stat-lbl">Session</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="mode">-</div>
      <div class="stat-lbl">Mode</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stateVal" style="font-size:11px">-</div>
      <div class="stat-lbl" id="stateLbl">State</div>
    </div>
  </div>

  <div class="loads" id="loads">
    <div class="load-card" id="loadsCard">
      <div class="load-val" id="loadsVal">0</div>
      <div class="load-lbl">Loads</div>
    </div>
    <div class="load-card" id="denialsCard">
      <div class="load-val" id="denialsVal">0</div>
      <div class="load-lbl">Denied</div>
    </div>
  </div>
  <div class="dc" id="dc"></div>
</div>

<script>
// Build 10 bars with increasing heights
const barsEl = document.getElementById('bars');
const barEls = [];
for (let i = 0; i < 10; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  b.style.height = (4 + i * 2.4) + 'px';
  barsEl.appendChild(b);
  barEls.push(b);
}

const volPct = document.getElementById('volPct');
const edging = document.getElementById('edging');
const edgesEl = document.getElementById('edges');
const sTime = document.getElementById('time');
const modeEl = document.getElementById('mode');
const evt = document.getElementById('evt');
const dc = document.getElementById('dc');
const loadsEl = document.getElementById('loads');
const loadsVal = document.getElementById('loadsVal');
const denialsVal = document.getElementById('denialsVal');
const stateValEl = document.getElementById('stateVal');
const stateLblEl = document.getElementById('stateLbl');
const tattleEl    = document.getElementById('tattle');
const tattleLbl   = document.getElementById('tattleLbl');
const tattleResult= document.getElementById('tattleResult');
const hrPill      = document.getElementById('hrPill');
const hrBpm       = document.getElementById('hrBpm');
const hrHeart     = document.getElementById('hrHeart');
const STATE_COLOR = { Flaccid: '#4fc3f7', Erect: '#4caf50', Edging: '#ff1744' };

let ws = null, rt = null;

function vc(p) {
  if (p < 40) return '#4caf50';
  if (p < 70) return '#ffeb3b';
  if (p < 90) return '#ff9800';
  return '#ff1744';
}

function fm(s) {
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}

function onMsg(e) {
  let d;
  try { d = JSON.parse(e.data); } catch { return; }

  const v = Math.round((d.volume||0)*100);
  const lit = Math.round(v / 10);
  const col = vc(v);
  for (let i = 0; i < 10; i++) {
    if (i < lit) {
      barEls[i].classList.add('lit');
      barEls[i].classList.toggle('hot', v > 70);
      barEls[i].style.background = col;
    } else {
      barEls[i].classList.remove('lit', 'hot');
      barEls[i].style.background = '';
    }
  }
  volPct.textContent = v + '%';

  edging.className = 'edging-banner' + (d.state === 'Edging' ? ' on' : '');

  // Tattle banner
  if (d.letmecum) {
    const l = d.letmecum;
    if (l.result === 'granted') {
      tattleLbl.textContent = 'they asked to cum';
      tattleResult.textContent = 'GRANTED  ' + fm(l.time_left || 0);
      tattleEl.className = 'tattle-banner granted';
    } else if (l.result === 'expired') {
      tattleLbl.textContent = 'they asked to cum';
      tattleResult.textContent = "TIME'S UP!";
      tattleEl.className = 'tattle-banner expired';
    } else {
      tattleLbl.textContent = 'they asked to cum';
      tattleResult.textContent = 'DENIED!' + (l.retry_in > 0 ? '  ' + l.retry_in + 's' : '');
      tattleEl.className = 'tattle-banner denied';
    }
  } else {
    tattleEl.className = 'tattle-banner';
  }

  edgesEl.textContent = d.edge_count || 0;
  sTime.textContent = fm(d.session_seconds || 0);
  const aggr = d.aggressiveness || '-';
  const abbrMap = {'Easy':'E','Middle':'M','Hard':'H','Expert':'X'};
  const colorMap = {'Easy':'#4caf50','Middle':'#ff9800','Hard':'#ff1744','Expert':'#ffd700'};
  modeEl.textContent = abbrMap[aggr] || aggr;
  modeEl.style.color = colorMap[aggr] || '#e040fb';

  let et = '', ec = '';
  if (d.cum_remaining > 0) {
    et = 'COOLDOWN ' + fm(d.cum_remaining);
    ec = 'p';
  } else if (d.letmecum) {
    const l = d.letmecum;
    if (l.result === 'granted') {
      et = '\u2714 CUM ' + fm(l.time_left||0);
      ec = 'g';
    } else if (l.result === 'expired') {
      et = 'TOO SLOW';
      ec = 'r';
    } else {
      et = 'DENIED' + (l.retry_in > 0 ? ' ' + l.retry_in + 's' : '');
      ec = 'r';
    }
  }
  evt.textContent = et;
  evt.className = 'evt' + (et ? ' on ' + ec : '');

  const cc = d.cum_count || 0;
  const dc2 = d.denial_count || 0;
  if (cc > 0 || dc2 > 0) {
    loadsVal.textContent = cc;
    denialsVal.textContent = dc2;
    loadsEl.classList.add('on');
  } else {
    loadsEl.classList.remove('on');
  }

  stateValEl.textContent = d.state || '-';
  stateValEl.style.color = STATE_COLOR[d.state] || '#e040fb';

  // HR pill
  if (d.hr && d.hr.connected && d.hr.bpm != null) {
    hrBpm.textContent = d.hr.bpm + ' bpm';
    // Animate heartbeat at the actual BPM rate
    const beatMs = Math.round(60000 / Math.max(30, Math.min(220, d.hr.bpm)));
    hrHeart.style.animationDuration = beatMs + 'ms';
    // Tint hotter (more red) as modifier climbs
    const mod = d.hr.modifier || 1.0;
    const t = Math.min(1, (mod - 1.0));           // 0..1
    const r = Math.round(233 + t * 22);
    const g = Math.round(30  - t * 30);
    hrPill.style.color = `rgb(${r},${g},99)`;
    hrPill.style.borderColor = `rgba(${r},${g},99,0.45)`;
    hrPill.className = 'hr-pill on';
  } else {
    hrPill.className = 'hr-pill';
  }

  document.querySelectorAll('.stat-lbl').forEach(el => {
    el.classList.remove('erect', 'edging');
    if (d.state === 'Edging') el.classList.add('edging');
    else if (d.state === 'Erect') el.classList.add('erect');
  });

  dc.textContent = '';
}

// Preview hook: lets a harness drive the overlay without a real WebSocket.
window.__feed = onMsg;

function conn() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket('ws://127.0.0.1:12347');
  ws.onmessage = onMsg;
  ws.onopen = () => { dc.textContent = ''; };
  ws.onclose = () => {
    dc.textContent = 'waiting...';
    if (!rt) rt = setTimeout(() => { rt = null; conn(); }, 2000);
  };
  ws.onerror = () => { ws.close(); };
}
conn();
</script>
</body>
</html>

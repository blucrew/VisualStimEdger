<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VisualStimEdger OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Rajdhani', 'Segoe UI', Arial, sans-serif;
    color: #eee;
    overflow: hidden;
  }
  .overlay {
    position: fixed;
    bottom: 12px;
    left: 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    width: 200px;
  }

  /* ── EDGING flash ─────────────────────── */
  .edging {
    text-align: center;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #ff1744;
    text-shadow: 0 0 12px #ff1744, 0 0 30px #ff174466;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .edging.on {
    opacity: 1;
    animation: pulse 0.6s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    0%   { text-shadow: 0 0 10px #ff1744; }
    100% { text-shadow: 0 0 20px #ff1744, 0 0 45px #ff174466; }
  }

  /* ── Event line ───────────────────────── */
  .evt {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .evt.on { opacity: 1; }
  .evt.g { color: #00e676; text-shadow: 0 0 6px #00e67666; }
  .evt.r { color: #ff1744; text-shadow: 0 0 6px #ff174466; font-size: 14px; }
  .evt.p { color: #e040fb; text-shadow: 0 0 6px #e040fb66; }

  /* ── Volume bars ──────────────────────── */
  .vol-card {
    background: rgba(0,0,0,0.5);
    border-radius: 6px;
    padding: 6px 8px;
    display: flex;
    align-items: flex-end;
    gap: 3px;
    border: 1px solid rgba(224,64,251,0.15);
  }
  .bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    flex: 1;
  }
  .bar {
    flex: 1;
    border-radius: 1px;
    background: rgba(255,255,255,0.08);
    transition: background 0.15s;
  }
  .bar.lit {
    background: #4caf50;
    box-shadow: 0 0 3px currentColor;
  }
  .bar.lit.hot {
    animation: flicker 0.15s infinite alternate;
  }
  @keyframes flicker {
    0%   { opacity: 1; }
    100% { opacity: 0.7; }
  }
  .vol-pct {
    font-size: 13px;
    font-weight: 800;
    min-width: 32px;
    text-align: right;
    color: #ccc;
    line-height: 1;
    padding-bottom: 1px;
  }

  /* ── Stat cards ───────────────────────── */
  .stats {
    display: flex;
    gap: 4px;
  }
  .stat {
    flex: 1;
    background: rgba(0,0,0,0.5);
    border-radius: 6px;
    padding: 5px 0;
    text-align: center;
    border: 1px solid rgba(224,64,251,0.15);
  }

  /* ── Zap icon ─────────────────────────── */
  .zap {
    font-size: 20px;
    line-height: 1;
    flex-shrink: 0;
    animation: zap 2s ease-in-out infinite;
    filter: drop-shadow(0 0 4px #e040fb);
  }
  @keyframes zap {
    0%, 90%, 100% { opacity: 0.3; }
    92% { opacity: 1; transform: scale(1.3); }
    94% { opacity: 0.4; }
    96% { opacity: 1; transform: scale(1.1); }
  }
  .stat-val {
    font-size: 16px;
    font-weight: 800;
    color: #e040fb;
    line-height: 1.1;
  }
  .stat-lbl {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #00e5ff;
    text-shadow: 0 0 4px #00e5ff88, 0 0 8px #00e5ff44;
    animation: neon-slow 2s ease-in-out infinite alternate;
  }
  .stat-lbl.erect {
    animation: neon-med 0.8s ease-in-out infinite alternate;
  }
  .stat-lbl.edging {
    animation: neon-fast 0.2s steps(2) infinite;
    color: #ff1744;
    text-shadow: 0 0 6px #ff1744cc, 0 0 14px #ff174466;
  }
  @keyframes neon-slow {
    0%   { text-shadow: 0 0 2px #00e5ff44; opacity: 0.5; }
    100% { text-shadow: 0 0 6px #00e5ffaa, 0 0 12px #00e5ff44; opacity: 0.9; }
  }
  @keyframes neon-med {
    0%   { text-shadow: 0 0 4px #00e5ff88; opacity: 0.7; }
    100% { text-shadow: 0 0 8px #00e5ffcc, 0 0 18px #00e5ff55; opacity: 1; }
  }
  @keyframes neon-fast {
    0%   { text-shadow: 0 0 6px #ff1744cc, 0 0 14px #ff174466; opacity: 1; }
    50%  { text-shadow: 0 0 2px #ff174488; opacity: 0.5; }
    100% { text-shadow: 0 0 10px #ff1744ff, 0 0 22px #ff174488; opacity: 1; }
  }

  .loads {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .loads.on { opacity: 1; }
  .load-card {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 4px 0;
    text-align: center;
  }
  .load-val {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
  }
  .load-lbl {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #aaa;
  }
  .dc {
    text-align: center;
    font-size: 8px;
    color: #444;
  }
</style>
</head>
<body>
<div class="overlay">
  <div class="edging" id="edging">EDGING!</div>
  <div class="evt" id="evt"></div>

  <div class="vol-card">
    <span class="zap">&#9889;</span>
    <div class="bars" id="bars"></div>
    <div class="vol-pct" id="volPct">0%</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="edges">0</div>
      <div class="stat-lbl">Edges</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="time">0:00</div>
      <div class="stat-lbl">Session</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="mode">-</div>
      <div class="stat-lbl">Mode</div>
    </div>
  </div>

  <div class="loads" id="loads">
    <div class="load-card" id="loadsCard">
      <div class="load-val" id="loadsVal">0</div>
      <div class="load-lbl">Loads</div>
    </div>
    <div class="load-card" id="denialsCard">
      <div class="load-val" id="denialsVal">0</div>
      <div class="load-lbl">Denied</div>
    </div>
  </div>
  <div class="dc" id="dc"></div>
</div>

<script>
// Build 10 bars with increasing heights
const barsEl = document.getElementById('bars');
const barEls = [];
for (let i = 0; i < 10; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  b.style.height = (4 + i * 2.4) + 'px';
  barsEl.appendChild(b);
  barEls.push(b);
}

const volPct = document.getElementById('volPct');
const edging = document.getElementById('edging');
const edgesEl = document.getElementById('edges');
const sTime = document.getElementById('time');
const modeEl = document.getElementById('mode');
const evt = document.getElementById('evt');
const dc = document.getElementById('dc');
const loadsEl = document.getElementById('loads');
const loadsVal = document.getElementById('loadsVal');
const denialsVal = document.getElementById('denialsVal');

let ws = null, rt = null;

function vc(p) {
  if (p < 40) return '#4caf50';
  if (p < 70) return '#ffeb3b';
  if (p < 90) return '#ff9800';
  return '#ff1744';
}

function fm(s) {
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}

function onMsg(e) {
  let d;
  try { d = JSON.parse(e.data); } catch { return; }

  const v = Math.round((d.volume||0)*100);
  const lit = Math.round(v / 10);
  const col = vc(v);
  for (let i = 0; i < 10; i++) {
    if (i < lit) {
      barEls[i].classList.add('lit');
      barEls[i].classList.toggle('hot', v > 70);
      barEls[i].style.background = col;
    } else {
      barEls[i].classList.remove('lit', 'hot');
      barEls[i].style.background = '';
    }
  }
  volPct.textContent = v + '%';

  edging.className = 'edging' + (d.state === 'Edging' ? ' on' : '');

  edgesEl.textContent = d.edge_count || 0;
  sTime.textContent = fm(d.session_seconds || 0);
  const aggr = d.aggressiveness || '-';
  const abbrMap = {'Easy':'E','Middle':'M','Hard':'H','Expert':'X'};
  const colorMap = {'Easy':'#4caf50','Middle':'#ff9800','Hard':'#ff1744','Expert':'#ffd700'};
  modeEl.textContent = abbrMap[aggr] || aggr;
  modeEl.style.color = colorMap[aggr] || '#e040fb';

  let et = '', ec = '';
  if (d.cum_remaining > 0) {
    et = 'COOLDOWN ' + fm(d.cum_remaining);
    ec = 'p';
  } else if (d.letmecum) {
    const l = d.letmecum;
    if (l.result === 'granted') {
      et = '\u2714 CUM ' + fm(l.time_left||0);
      ec = 'g';
    } else if (l.result === 'expired') {
      et = 'TOO SLOW';
      ec = 'r';
    } else {
      et = 'DENIED' + (l.retry_in > 0 ? ' ' + l.retry_in + 's' : '');
      ec = 'r';
    }
  }
  evt.textContent = et;
  evt.className = 'evt' + (et ? ' on ' + ec : '');

  const cc = d.cum_count || 0;
  const dc2 = d.denial_count || 0;
  if (cc > 0 || dc2 > 0) {
    loadsVal.textContent = cc;
    denialsVal.textContent = dc2;
    loadsEl.classList.add('on');
  } else {
    loadsEl.classList.remove('on');
  }

  document.querySelectorAll('.stat-lbl').forEach(el => {
    el.classList.remove('erect', 'edging');
    if (d.state === 'Edging') el.classList.add('edging');
    else if (d.state === 'Erect') el.classList.add('erect');
  });

  dc.textContent = '';
}

function conn() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket('ws://127.0.0.1:12347');
  ws.onmessage = onMsg;
  ws.onopen = () => { dc.textContent = ''; };
  ws.onclose = () => {
    dc.textContent = 'waiting...';
    if (!rt) rt = setTimeout(() => { rt = null; conn(); }, 2000);
  };
  ws.onerror = () => { ws.close(); };
}
conn();
</script>
</body>
</html>

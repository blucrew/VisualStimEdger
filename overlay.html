<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VisualStimEdger OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ── Theme variables — overridden by JS on load ── */
  :root {
    --t-edging:  #ffffff;
    --t-deny:    #ff9999;
    --t-grant:   #99ffbb;
    --t-ruin:    #cc99ff;
    --t-hr:      #ffffff;
    --t-accent:  #cccccc;
    --t-label:   #aaaaaa;
    --t-pill:    rgba(0,0,0,0.65);
    --t-border:  rgba(255,255,255,0.15);
    --t-text:    #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Rajdhani', 'Segoe UI', Arial, sans-serif;
    color: var(--t-text);
    overflow: hidden;
  }
  .overlay {
    position: fixed;
    bottom: 12px;
    left: 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    width: 200px;
  }

  /* ── EDGING banner ── */
  .edging-banner {
    display: none;
    width: 100%;
    align-items: center;
    justify-content: center;
    padding: 7px 0;
    background: var(--t-pill);
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12);
    font-family: 'Rajdhani', 'Impact', 'Arial Black', sans-serif;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 0.12em;
    white-space: nowrap;
    color: var(--t-edging);
    pointer-events: none;
  }
  .edging-banner.on {
    display: flex;
    animation: edge-flash 0.28s steps(2) infinite;
  }
  @keyframes edge-flash {
    0%   {
      color: var(--t-edging);
      text-shadow: 0 0 20px currentColor, 0 0 45px currentColor, 0 0 90px currentColor;
      transform: scale(1);
    }
    50%  {
      color: #ffffff;
      text-shadow: 0 0 30px currentColor, 0 0 70px currentColor;
      transform: scale(1.04);
    }
  }

  /* ── TATTLE banner ── */
  .tattle-banner {
    display: none;
    width: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5px 0 4px;
    background: var(--t-pill);
    border-radius: 6px;
    font-family: 'Rajdhani', 'Impact', 'Arial Black', sans-serif;
    font-weight: 900;
    letter-spacing: 0.08em;
    white-space: nowrap;
    pointer-events: none;
  }
  .tattle-lbl {
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.65;
    font-weight: 700;
  }
  .tattle-result {
    font-size: 22px;
    line-height: 1.15;
  }
  .tattle-banner.denied {
    display: flex;
    color: var(--t-deny);
    border: 1px solid rgba(255,255,255,0.12);
    animation: tattle-deny 0.45s steps(2) infinite;
  }
  .tattle-banner.granted {
    display: flex;
    color: var(--t-grant);
    border: 1px solid rgba(255,255,255,0.12);
    animation: tattle-grant 1.2s ease-in-out infinite alternate;
  }
  .tattle-banner.expired {
    display: flex;
    color: #ff9800;
    border: 1px solid rgba(255,152,0,0.35);
  }
  @keyframes tattle-deny {
    0%   { text-shadow: 0 0 12px currentColor, 0 0 30px currentColor; opacity: 1; }
    50%  { text-shadow: none; opacity: 0.55; }
  }
  @keyframes tattle-grant {
    0%   { text-shadow: 0 0 6px currentColor; }
    100% { text-shadow: 0 0 16px currentColor, 0 0 35px currentColor; }
  }

  /* ── RUIN banner ── */
  .ruin-banner {
    display: none;
    width: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5px 0 4px;
    background: var(--t-pill);
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12);
    font-family: 'Rajdhani', 'Impact', 'Arial Black', sans-serif;
    font-weight: 900;
    letter-spacing: 0.08em;
    white-space: nowrap;
    pointer-events: none;
    color: var(--t-ruin);
  }
  .ruin-lbl {
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.65;
    font-weight: 700;
  }
  .ruin-result {
    font-size: 22px;
    line-height: 1.15;
  }
  .ruin-banner.on {
    display: flex;
    animation: ruin-pulse 1.4s ease-in-out infinite alternate;
  }
  @keyframes ruin-pulse {
    0%   { text-shadow: 0 0 8px currentColor, 0 0 20px currentColor; opacity: 0.85; }
    100% { text-shadow: 0 0 14px currentColor, 0 0 35px currentColor, 0 0 60px currentColor; opacity: 1; }
  }

  /* ── Event line ── */
  .evt {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .evt.on { opacity: 1; }
  .evt.g { color: var(--t-grant); text-shadow: 0 0 6px currentColor; }
  .evt.r { color: var(--t-deny);  text-shadow: 0 0 6px currentColor; font-size: 14px; }
  .evt.p { color: var(--t-ruin);  text-shadow: 0 0 6px currentColor; }

  /* ── Volume bars ── */
  .vol-card {
    background: var(--t-pill);
    border-radius: 6px;
    padding: 6px 8px;
    display: flex;
    align-items: flex-end;
    gap: 3px;
    border: 1px solid var(--t-border);
  }
  .bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    flex: 1;
  }
  .bar {
    flex: 1;
    border-radius: 1px;
    background: rgba(255,255,255,0.08);
    transition: background 0.15s;
  }
  .bar.lit {
    background: #4caf50;
    box-shadow: 0 0 3px currentColor;
  }
  .bar.lit.hot {
    animation: flicker 0.15s infinite alternate;
  }
  @keyframes flicker {
    0%   { opacity: 1; }
    100% { opacity: 0.7; }
  }
  .vol-pct {
    font-size: 13px;
    font-weight: 800;
    min-width: 32px;
    text-align: right;
    color: var(--t-text);
    line-height: 1;
    padding-bottom: 1px;
  }

  /* ── Stat cards ── */
  .stats {
    display: flex;
    gap: 4px;
  }
  .stat {
    flex: 1;
    background: var(--t-pill);
    border-radius: 6px;
    padding: 5px 0;
    text-align: center;
    border: 1px solid var(--t-border);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  /* ── Zap icon ── */
  .zap {
    font-size: 20px;
    line-height: 1;
    flex-shrink: 0;
    color: var(--t-accent);
    animation: zap 2s ease-in-out infinite;
  }
  @keyframes zap {
    0%, 90%, 100% { opacity: 0.3; }
    92% { opacity: 1; transform: scale(1.3); }
    94% { opacity: 0.4; }
    96% { opacity: 1; transform: scale(1.1); }
  }
  .stat-val {
    font-size: 16px;
    font-weight: 800;
    color: var(--t-accent);
    line-height: 1.1;
  }
  .stat-lbl {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--t-label);
    animation: neon-slow 2s ease-in-out infinite alternate;
  }
  .stat-lbl.erect {
    animation: neon-med 0.8s ease-in-out infinite alternate;
  }
  .stat-lbl.edging {
    color: var(--t-edging);
    animation: neon-fast 0.2s steps(2) infinite;
  }
  @keyframes neon-slow {
    0%   { opacity: 0.5; }
    100% { text-shadow: 0 0 6px currentColor; opacity: 0.9; }
  }
  @keyframes neon-med {
    0%   { opacity: 0.7; }
    100% { text-shadow: 0 0 8px currentColor; opacity: 1; }
  }
  @keyframes neon-fast {
    0%   { text-shadow: 0 0 6px currentColor; opacity: 1; }
    50%  { opacity: 0.5; }
    100% { text-shadow: 0 0 10px currentColor; opacity: 1; }
  }

  .loads {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .loads.on { opacity: 1; }
  .load-card {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 2px 0;
    text-align: center;
  }
  .load-val {
    font-size: 13px;
    font-weight: 700;
    color: var(--t-text);
    line-height: 1.2;
  }
  .load-lbl {
    font-size: 7px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--t-label);
  }
  .dc {
    text-align: center;
    font-size: 8px;
    color: #444;
  }

  /* ── HR pill ── */
  .hr-pill {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: var(--t-pill);
    border-radius: 6px;
    border: 1px solid var(--t-border);
    padding: 5px 12px;
    font-size: 18px;
    font-weight: 800;
    color: var(--t-hr);
    letter-spacing: 0.05em;
    pointer-events: none;
  }
  .hr-pill.on { display: flex; }
  .hr-heart {
    font-size: 22px;
    animation: heartbeat 1s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%   { transform: scale(1);    opacity: 1;   }
    14%  { transform: scale(1.3);  opacity: 1;   }
    28%  { transform: scale(1);    opacity: 0.8; }
    42%  { transform: scale(1.15); opacity: 1;   }
    70%  { transform: scale(1);    opacity: 0.9; }
    100% { transform: scale(1);    opacity: 1;   }
  }
</style>
</head>
<body>
<div class="overlay">
  <div class="edging-banner" id="edging">EDGING!!</div>
  <div class="tattle-banner" id="tattle">
    <div class="tattle-lbl" id="tattleLbl">they asked to cum</div>
    <div class="tattle-result" id="tattleResult">DENIED!</div>
  </div>
  <div class="ruin-banner" id="ruinBanner">
    <div class="ruin-lbl">they were ruined</div>
    <div class="ruin-result">RUINED 😈</div>
  </div>
  <div class="hr-pill" id="hrPill">
    <span class="hr-heart" id="hrHeart">♥</span>
    <span id="hrBpm">-- bpm</span>
  </div>
  <div class="evt" id="evt"></div>

  <div class="vol-card">
    <span class="zap">&#9889;</span>
    <div class="bars" id="bars"></div>
    <div class="vol-pct" id="volPct">0%</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="edges">0</div>
      <div class="stat-lbl">Edges</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="time">0:00</div>
      <div class="stat-lbl">Session</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="mode">-</div>
      <div class="stat-lbl">Mode</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stateVal" style="font-size:11px">-</div>
      <div class="stat-lbl" id="stateLbl">State</div>
    </div>
  </div>

  <div class="loads" id="loads">
    <div class="load-card" id="loadsCard">
      <div class="load-val" id="loadsVal">0</div>
      <div class="load-lbl">Loads</div>
    </div>
    <div class="load-card" id="denialsCard">
      <div class="load-val" id="denialsVal">0</div>
      <div class="load-lbl">Denied</div>
    </div>
  </div>
  <div class="dc" id="dc"></div>
</div>

<script>
// ── Themes ────────────────────────────────────────────────────────────────────
const THEMES = {
  ghost: {
    vars: {
      '--t-edging': '#ffffff', '--t-deny': '#ff9999', '--t-grant': '#99ffbb',
      '--t-ruin': '#cc99ff',   '--t-hr': '#ffffff',   '--t-accent': '#cccccc',
      '--t-label': '#aaaaaa',  '--t-pill': 'rgba(0,0,0,0.65)',
      '--t-border': 'rgba(255,255,255,0.15)', '--t-text': '#ffffff',
    },
    stateColor: { Flaccid: '#aaddff', Erect: '#aaffcc', Edging: '#ffffff' },
    hrBase: [255, 255, 255],
  },
  crimson: {
    vars: {
      '--t-edging': '#ff1744', '--t-deny': '#ff1744', '--t-grant': '#00e676',
      '--t-ruin': '#9c27b0',   '--t-hr': '#e91e63',   '--t-accent': '#e040fb',
      '--t-label': '#00e5ff',  '--t-pill': 'rgba(0,0,0,0.5)',
      '--t-border': 'rgba(224,64,251,0.15)', '--t-text': '#cccccc',
    },
    stateColor: { Flaccid: '#4fc3f7', Erect: '#4caf50', Edging: '#ff1744' },
    hrBase: [233, 30, 99],
  },
  neon: {
    vars: {
      '--t-edging': '#00ffff', '--t-deny': '#ff3300', '--t-grant': '#39ff14',
      '--t-ruin': '#ff00ff',   '--t-hr': '#ff00ff',   '--t-accent': '#00ffff',
      '--t-label': '#00ffff',  '--t-pill': 'rgba(0,0,10,0.82)',
      '--t-border': 'rgba(0,255,255,0.25)', '--t-text': '#f0f0f0',
    },
    stateColor: { Flaccid: '#00bfff', Erect: '#39ff14', Edging: '#00ffff' },
    hrBase: [255, 0, 255],
  },
  amber: {
    vars: {
      '--t-edging': '#ffb300', '--t-deny': '#ff6d00', '--t-grant': '#76ff03',
      '--t-ruin': '#ff3d00',   '--t-hr': '#ffb300',   '--t-accent': '#ffd740',
      '--t-label': '#ffd740',  '--t-pill': 'rgba(0,0,0,0.6)',
      '--t-border': 'rgba(255,179,0,0.2)', '--t-text': '#fff3e0',
    },
    stateColor: { Flaccid: '#40c4ff', Erect: '#76ff03', Edging: '#ffb300' },
    hrBase: [255, 179, 0],
  },
};

// Read ?theme= from URL, default ghost
const urlTheme = new URLSearchParams(location.search).get('theme') || 'ghost';
const theme = THEMES[urlTheme] || THEMES.ghost;

// Apply CSS vars
const root = document.documentElement.style;
Object.entries(theme.vars).forEach(([k, v]) => root.setProperty(k, v));

let STATE_COLOR = theme.stateColor;
let hrBase      = theme.hrBase;   // [r, g, b] at resting BPM

// ── Build volume bars ─────────────────────────────────────────────────────────
const barsEl = document.getElementById('bars');
const barEls = [];
for (let i = 0; i < 10; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  b.style.height = (4 + i * 2.4) + 'px';
  barsEl.appendChild(b);
  barEls.push(b);
}

const volPct      = document.getElementById('volPct');
const edging      = document.getElementById('edging');
const edgesEl     = document.getElementById('edges');
const sTime       = document.getElementById('time');
const modeEl      = document.getElementById('mode');
const evt         = document.getElementById('evt');
const dc          = document.getElementById('dc');
const loadsEl     = document.getElementById('loads');
const loadsVal    = document.getElementById('loadsVal');
const denialsVal  = document.getElementById('denialsVal');
const stateValEl  = document.getElementById('stateVal');
const stateLblEl  = document.getElementById('stateLbl');
const tattleEl    = document.getElementById('tattle');
const tattleLbl   = document.getElementById('tattleLbl');
const tattleResult= document.getElementById('tattleResult');
const ruinBanner  = document.getElementById('ruinBanner');
const hrPill      = document.getElementById('hrPill');
const hrBpm       = document.getElementById('hrBpm');
const hrHeart     = document.getElementById('hrHeart');

let ws = null, rt = null, ruinTimer = null;

function vc(p) {
  if (p < 40) return '#4caf50';
  if (p < 70) return '#ffeb3b';
  if (p < 90) return '#ff9800';
  return '#ff1744';
}

function fm(s) {
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}

function onMsg(e) {
  let d;
  try { d = JSON.parse(e.data); } catch { return; }

  const v = Math.round((d.volume||0)*100);
  const lit = Math.round(v / 10);
  const col = vc(v);
  for (let i = 0; i < 10; i++) {
    if (i < lit) {
      barEls[i].classList.add('lit');
      barEls[i].classList.toggle('hot', v > 70);
      barEls[i].style.background = col;
    } else {
      barEls[i].classList.remove('lit', 'hot');
      barEls[i].style.background = '';
    }
  }
  volPct.textContent = v + '%';

  edging.className = 'edging-banner' + (d.state === 'Edging' ? ' on' : '');

  // Tattle banner
  if (d.letmecum) {
    const l = d.letmecum;
    if (l.result === 'granted') {
      tattleLbl.textContent = 'they asked to cum';
      tattleResult.textContent = 'GRANTED  ' + fm(l.time_left || 0);
      tattleEl.className = 'tattle-banner granted';
    } else if (l.result === 'expired') {
      tattleLbl.textContent = 'they asked to cum';
      tattleResult.textContent = "TIME'S UP!";
      tattleEl.className = 'tattle-banner expired';
    } else if (l.result === 'ruined') {
      tattleEl.className = 'tattle-banner';
    } else {
      tattleLbl.textContent = 'they asked to cum';
      tattleResult.textContent = 'DENIED!' + (l.retry_in > 0 ? '  ' + l.retry_in + 's' : '');
      tattleEl.className = 'tattle-banner denied';
    }
  } else {
    tattleEl.className = 'tattle-banner';
  }

  // Ruin banner — 8 second auto-hide
  if (d.letmecum && d.letmecum.result === 'ruined') {
    if (!ruinBanner.classList.contains('on')) {
      ruinBanner.classList.add('on');
      if (ruinTimer) clearTimeout(ruinTimer);
      ruinTimer = setTimeout(() => {
        ruinBanner.classList.remove('on');
        ruinTimer = null;
      }, 8000);
    }
  }

  edgesEl.textContent = d.edge_count || 0;
  sTime.textContent = fm(d.session_seconds || 0);
  const aggr = d.aggressiveness || '-';
  const abbrMap  = { Easy:'E', Middle:'M', Hard:'H', Expert:'X' };
  const colorMap = { Easy:'#4caf50', Middle:'#ff9800', Hard:'#ff1744', Expert:'#ffd700' };
  modeEl.textContent = abbrMap[aggr] || aggr;
  modeEl.style.color = colorMap[aggr] || theme.vars['--t-accent'];

  let et = '', ec = '';
  if (d.cum_remaining > 0) {
    et = 'COOLDOWN ' + fm(d.cum_remaining);
    ec = 'p';
  } else if (d.letmecum) {
    const l = d.letmecum;
    if (l.result === 'granted') {
      et = '✔ CUM ' + fm(l.time_left||0);
      ec = 'g';
    } else if (l.result === 'expired') {
      et = 'TOO SLOW';
      ec = 'r';
    } else {
      et = 'DENIED' + (l.retry_in > 0 ? ' ' + l.retry_in + 's' : '');
      ec = 'r';
    }
  }
  evt.textContent = et;
  evt.className = 'evt' + (et ? ' on ' + ec : '');

  const cc  = d.cum_count || 0;
  const dc2 = d.denial_count || 0;
  if (cc > 0 || dc2 > 0) {
    loadsVal.textContent  = cc;
    denialsVal.textContent = dc2;
    loadsEl.classList.add('on');
  } else {
    loadsEl.classList.remove('on');
  }

  stateValEl.textContent = d.state || '-';
  stateValEl.style.color = STATE_COLOR[d.state] || theme.vars['--t-accent'];

  // HR pill — tint hotter as modifier climbs
  if (d.hr && d.hr.connected && d.hr.bpm != null) {
    hrBpm.textContent = d.hr.bpm + ' bpm';
    const beatMs = Math.round(60000 / Math.max(30, Math.min(220, d.hr.bpm)));
    hrHeart.style.animationDuration = beatMs + 'ms';
    const mod = d.hr.modifier || 1.0;
    const t   = Math.min(1, mod - 1.0);  // 0..1
    // Interpolate from hrBase toward red (#ff1010) as modifier climbs
    const r = Math.round(hrBase[0] + t * (255 - hrBase[0]));
    const g = Math.round(hrBase[1] + t * (16  - hrBase[1]));
    const b = Math.round(hrBase[2] + t * (16  - hrBase[2]));
    hrPill.style.color       = `rgb(${r},${g},${b})`;
    hrPill.style.borderColor = `rgba(${r},${g},${b},0.45)`;
    hrPill.className = 'hr-pill on';
  } else {
    hrPill.style.color = hrPill.style.borderColor = '';
    hrPill.className = 'hr-pill';
  }

  document.querySelectorAll('.stat-lbl').forEach(el => {
    el.classList.remove('erect', 'edging');
    if (d.state === 'Edging') el.classList.add('edging');
    else if (d.state === 'Erect') el.classList.add('erect');
  });

  dc.textContent = '';
}

// Preview hook
window.__feed = onMsg;

function conn() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket('ws://127.0.0.1:12347');
  ws.onmessage = onMsg;
  ws.onopen  = () => { dc.textContent = ''; };
  ws.onclose = () => {
    dc.textContent = 'waiting...';
    if (!rt) rt = setTimeout(() => { rt = null; conn(); }, 2000);
  };
  ws.onerror = () => { ws.close(); };
}
conn();
</script>
</body>
</html>
